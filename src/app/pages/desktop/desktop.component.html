<section class="desktop-screen" role="main" aria-label="Desktop">
  <div class="desktop-icons">
    <app-desktop-icon
      label="{{ 'pages.desktop.app1' | translate }}"
      iconSrc="/assets/images/apps/my_pc.png"
      (select)="openApp('app1')">
    </app-desktop-icon>

    <app-desktop-icon
      label="{{ 'pages.desktop.app2' | translate }}"
      iconSrc="/assets/images/apps/explorer.png"
      (select)="openApp('app2')">
    </app-desktop-icon>

    <app-desktop-icon
      label="{{ 'pages.desktop.app3' | translate }}"
      iconSrc="/assets/images/apps/photo_viewer.png"
      (select)="openApp('app3')">
    </app-desktop-icon>
  </div>

  <div class="desktop-windows">
    @for (win of windows(); track win.id) {
      @if (win.state === 'open') {
        <section
          class="desktop-window"
          [attr.data-window-id]="win.id"
          [class.desktop-window--active]="win.active"
          [class.desktop-window--opening]="isPendingOpenAnimation(win.id)"
          [style.z-index]="win.zIndex"
          (mousedown)="focusWindow(win.id)"
        > 
          <header class="desktop-window__header">
            <span class="desktop-window__title">{{ win.titleKey | translate }}</span>

            <div class="desktop-window__actions">
              <button type="button" class="xp-win-btn" (click)="minimizeWindow(win.id)">_</button>
              <button type="button" class="xp-win-btn xp-win-btn--close" (click)="closeWindow(win.id)">x</button>
            </div>
          </header>

          <div class="desktop-window__body">
            @switch (win.appType) {
              @case ('my-pc') {
                <app-my-pc-app />
              }
              @case ('internet-explorer') {
                <app-internet-explorer-app />
              }
              @case ('photo-viewer') {
                <app-photo-viewer-app />
              }
              @default {
                <p class="desktop-window__placeholder">{{ win.content }}</p>
              }
            }
          </div>
        </section>
      }
    }
  </div>

  <app-xp-taskbar
    [windows]="windows()"
    (windowTabClick)="onTaskbarTabClick($event)"
    (start)="onStart()">
  </app-xp-taskbar>
</section>
